server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # HTML siempre fresco: evita que el navegador pida CSS/JS con hash viejo tras un deploy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Assets de webpack (tienen hash en el nombre)
    location /static/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # CSS, fuentes, imágenes y JS de /public (sin hash)
    location ~* ^/(css|fonts|js|img)/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA: /registro y /deportes sirven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
